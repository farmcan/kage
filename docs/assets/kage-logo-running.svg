<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KAGE running logo</title>
  <desc id="desc">An animated KAGE session portal mark showing local agent activity in progress.</desc>
  <defs>
    <linearGradient id="badge" x1="96" y1="72" x2="416" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182026"/>
      <stop offset="1" stop-color="#0b1013"/>
    </linearGradient>
    <linearGradient id="screen" x1="152" y1="140" x2="360" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202b32"/>
      <stop offset="1" stop-color="#12191e"/>
    </linearGradient>
    <filter id="lift" x="-18%" y="-16%" width="136%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#061014" flood-opacity="0.24"/>
    </filter>
    <clipPath id="screen-clip">
      <rect x="168" y="158" width="176" height="126" rx="19"/>
    </clipPath>
  </defs>

  <style>
    .mark {
      animation: mark-breathe 2.4s ease-in-out infinite;
      transform-box: view-box;
      transform-origin: 50% 58%;
    }

    .scan {
      animation: screen-scan 1.8s ease-in-out infinite;
    }

    .prompt {
      animation: prompt-run 1.12s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .cursor {
      animation: cursor-run 1.12s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .agent-dot {
      animation: agent-step 1.28s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .agent-dot.green {
      animation-delay: 120ms;
    }

    .agent-dot.warm {
      animation-delay: 240ms;
    }

    .agent-arc {
      animation: arc-flow 1.28s ease-in-out infinite;
      stroke-dasharray: 36 18;
      stroke-dashoffset: 0;
    }

    @keyframes mark-breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      45% {
        transform: translateY(-4px) scale(1.012);
      }
    }

    @keyframes screen-scan {
      0% {
        transform: translateY(-56px);
        opacity: 0;
      }
      18%, 74% {
        opacity: 0.18;
      }
      100% {
        transform: translateY(120px);
        opacity: 0;
      }
    }

    @keyframes prompt-run {
      0%, 100% {
        opacity: 0.84;
        transform: translateX(0);
      }
      46% {
        opacity: 1;
        transform: translateX(7px);
      }
    }

    @keyframes cursor-run {
      0%, 100% {
        opacity: 0.64;
        transform: scaleX(0.88);
      }
      46% {
        opacity: 1;
        transform: scaleX(1.12);
      }
    }

    @keyframes agent-step {
      0%, 100% {
        transform: translateY(0) scale(1);
        filter: brightness(0.95);
      }
      42% {
        transform: translateY(-9px) scale(1.08);
        filter: brightness(1.14);
      }
    }

    @keyframes arc-flow {
      0%, 100% {
        opacity: 0.44;
        stroke-dashoffset: 0;
      }
      50% {
        opacity: 0.7;
        stroke-dashoffset: -54;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mark,
      .scan,
      .prompt,
      .cursor,
      .agent-dot,
      .agent-arc {
        animation: none;
      }

      .scan {
        opacity: 0;
      }
    }
  </style>

  <g class="mark" filter="url(#lift)">
    <rect x="56" y="56" width="400" height="400" rx="104" fill="url(#badge)"/>
    <rect x="144" y="133" width="224" height="176" rx="36" fill="#f7f2e6"/>
    <rect x="168" y="158" width="176" height="126" rx="19" fill="url(#screen)"/>

    <g clip-path="url(#screen-clip)">
      <rect class="scan" x="168" y="158" width="176" height="28" fill="#f2b84b"/>
    </g>

    <path class="prompt" d="M195 198l45 36-45 36" fill="none" stroke="#f2b84b" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path class="cursor" d="M267 267h72" fill="none" stroke="#f7f2e6" stroke-width="24" stroke-linecap="round"/>

    <circle class="agent-dot blue" cx="164" cy="360" r="24" fill="#3b82f6"/>
    <circle class="agent-dot green" cx="256" cy="376" r="24" fill="#15a074"/>
    <circle class="agent-dot warm" cx="348" cy="360" r="24" fill="#cf7654"/>
    <path class="agent-arc" d="M183 363c44 33 119 34 164 0" fill="none" stroke="#f7f2e6" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
