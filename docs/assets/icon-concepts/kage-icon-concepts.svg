<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">KAGE icon concept sheet</title>
  <desc id="desc">Six vector icon directions for the KAGE desktop app and GitHub project identity.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#101418" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182026"/>
      <stop offset="1" stop-color="#0b1013"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ddf8c"/>
      <stop offset="1" stop-color="#1f7a5d"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78d5ff"/>
      <stop offset="1" stop-color="#3155c6"/>
    </linearGradient>
    <linearGradient id="violetGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7b8ff"/>
      <stop offset="1" stop-color="#7547c8"/>
    </linearGradient>
    <style>
      .sheet-bg { fill: #f7f4ed; }
      .panel { fill: #ffffff; stroke: #ded8ca; stroke-width: 2; }
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; font-size: 28px; font-weight: 750; fill: #182026; }
      .note { font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; font-size: 17px; fill: #6f6a60; }
      .small { font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; font-size: 15px; fill: #847d72; }
      .mono { font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace; }
      .dark { fill: #101418; }
      .cream { fill: #f7f2e6; }
      .green { fill: #1f7a5d; }
      .mint { fill: #8be094; }
      .amber { fill: #f2b84b; }
      .blue { fill: #3b69e3; }
      .violet { fill: #8a5de8; }
      .stroke-dark { stroke: #101418; }
      .stroke-cream { stroke: #f7f2e6; }
      .stroke-green { stroke: #1f7a5d; }
      .stroke-amber { stroke: #f2b84b; }
      .stroke-blue { stroke: #3b69e3; }
      .stroke-violet { stroke: #8a5de8; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="sheet-bg" width="1800" height="1200"/>
  <text x="90" y="92" class="label" font-size="40">KAGE Icon Directions</text>
  <text x="90" y="128" class="note">Choose by product story: local memory, agent switching, shadow clone, or desktop control surface.</text>

  <!-- Panel A -->
  <g transform="translate(90 170)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="url(#night)"/>
      <path d="M42 145c32 46 98 61 143 36 35-19 54-55 49-92-24 18-53 22-84 11-29-10-54-7-74 9-17 13-28 25-34 36z" class="green"/>
      <path d="M200 45c-10 38-33 62-70 69-32 6-61-5-82-29 19-26 46-41 82-44 25-2 49-1 70 4z" class="mint"/>
      <path d="M55 154c42-17 77-37 104-61 28-24 48-49 59-75" class="line stroke-dark" stroke-width="13"/>
      <path d="M83 75l33 28-33 28" class="line stroke-dark" stroke-width="16"/>
      <path d="M128 132h54" class="line stroke-dark" stroke-width="16"/>
      <path d="M112 160c16 16 38 25 64 24" class="line stroke-amber" stroke-width="10"/>
    </g>
    <text x="36" y="312" class="label">A. Shadow Leaf Prompt</text>
    <text x="36" y="344" class="note">Closest to current mark, cleaner and more icon-like.</text>
    <text x="36" y="374" class="small">Best if we want continuity with the existing KAGE identity.</text>
  </g>

  <!-- Panel B -->
  <g transform="translate(640 170)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="#101418"/>
      <rect x="42" y="52" width="136" height="104" rx="18" fill="#f7f2e6"/>
      <rect x="56" y="66" width="108" height="76" rx="11" fill="#182026"/>
      <path d="M72 88l22 18-22 18" class="line stroke-amber" stroke-width="12"/>
      <path d="M105 126h43" class="line stroke-cream" stroke-width="12"/>
      <circle cx="54" cy="176" r="12" fill="#7ddf8c"/>
      <circle cx="110" cy="184" r="12" fill="#78d5ff"/>
      <circle cx="166" cy="176" r="12" fill="#d7b8ff"/>
      <path d="M62 176c23 18 74 24 96 0" class="line stroke-cream" stroke-width="8" opacity="0.55"/>
    </g>
    <text x="36" y="312" class="label">B. Session Portal</text>
    <text x="36" y="344" class="note">A desktop control surface for multiple local agents.</text>
    <text x="36" y="374" class="small">Most direct for "open app, pick session, continue work".</text>
  </g>

  <!-- Panel C -->
  <g transform="translate(1190 170)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="#f7f2e6"/>
      <rect x="48" y="60" width="110" height="110" rx="24" fill="#8a5de8" opacity="0.72"/>
      <rect x="70" y="42" width="110" height="110" rx="24" fill="#1f7a5d"/>
      <path d="M93 87l24 20-24 20" class="line stroke-cream" stroke-width="13"/>
      <path d="M126 129h34" class="line stroke-cream" stroke-width="13"/>
      <path d="M75 165c18 12 44 17 78 17" class="line stroke-dark" stroke-width="10" opacity="0.85"/>
      <path d="M70 42h110v110" fill="none" stroke="#101418" stroke-width="10" opacity="0.28"/>
    </g>
    <text x="36" y="312" class="label">C. Shadow Clone Stack</text>
    <text x="36" y="344" class="note">Forking context into parallel sessions.</text>
    <text x="36" y="374" class="small">Strongest match to the "kage / clone" naming idea.</text>
  </g>

  <!-- Panel D -->
  <g transform="translate(90 640)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="url(#greenGlow)"/>
      <path d="M58 58v104" class="line stroke-dark" stroke-width="20"/>
      <path d="M72 110l74-56" class="line stroke-dark" stroke-width="20"/>
      <path d="M76 112l80 62" class="line stroke-dark" stroke-width="20"/>
      <path d="M50 164h112" class="line stroke-cream" stroke-width="16"/>
      <path d="M153 72l30 26-30 26" class="line stroke-amber" stroke-width="14"/>
      <circle cx="173" cy="169" r="12" fill="#101418"/>
    </g>
    <text x="36" y="312" class="label">D. K Prompt Monogram</text>
    <text x="36" y="344" class="note">Readable as KAGE at tiny sizes.</text>
    <text x="36" y="374" class="small">Best for GitHub avatar, dock, and quick brand recall.</text>
  </g>

  <!-- Panel E -->
  <g transform="translate(640 640)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="url(#blueGlow)"/>
      <path d="M56 82c0-18 25-32 55-32s55 14 55 32-25 32-55 32-55-14-55-32z" fill="#f7f2e6"/>
      <path d="M56 82v56c0 18 25 32 55 32s55-14 55-32V82" fill="none" stroke="#f7f2e6" stroke-width="18"/>
      <path d="M76 118c21 12 49 12 70 0" class="line stroke-dark" stroke-width="9" opacity="0.38"/>
      <path d="M78 143c22 12 48 12 68 0" class="line stroke-dark" stroke-width="9" opacity="0.38"/>
      <path d="M112 55v-22" class="line stroke-amber" stroke-width="12"/>
      <path d="M86 64l-17-17" class="line stroke-amber" stroke-width="12"/>
      <path d="M139 64l17-17" class="line stroke-amber" stroke-width="12"/>
    </g>
    <text x="36" y="312" class="label">E. Local Memory Core</text>
    <text x="36" y="344" class="note">Local-first transcript memory as a product promise.</text>
    <text x="36" y="374" class="small">Best if privacy and "memory layer" should lead.</text>
  </g>

  <!-- Panel F -->
  <g transform="translate(1190 640)">
    <rect class="panel" width="520" height="420" rx="34" filter="url(#softShadow)"/>
    <g transform="translate(150 44)">
      <rect width="220" height="220" rx="48" fill="#101418"/>
      <rect x="34" y="62" width="62" height="86" rx="14" fill="#f7f2e6"/>
      <rect x="124" y="62" width="62" height="86" rx="14" fill="#f7f2e6"/>
      <path d="M50 91l15 13-15 13" class="line stroke-green" stroke-width="9"/>
      <path d="M140 91l15 13-15 13" class="line stroke-blue" stroke-width="9"/>
      <path d="M87 105h47" class="line stroke-amber" stroke-width="12"/>
      <path d="M121 86l19 19-19 19" class="line stroke-amber" stroke-width="12"/>
      <path d="M65 166c28 17 62 17 90 0" class="line stroke-violet" stroke-width="11"/>
    </g>
    <text x="36" y="312" class="label">F. Agent Bridge Gate</text>
    <text x="36" y="344" class="note">Moving sessions between Codex, Claude, and QoderCLI.</text>
    <text x="36" y="374" class="small">Best if "bridge across agents" is the main pitch.</text>
  </g>
</svg>
