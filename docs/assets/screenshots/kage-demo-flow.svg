<svg width="1440" height="620" viewBox="0 0 1440 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: SFMono-Regular, Menlo, Consolas, monospace; }
    .kicker { font-size: 13px; font-weight: 900; letter-spacing: .06em; text-transform: uppercase; }
    .title { font-size: 23px; font-weight: 850; fill: #17202a; }
    .body { font-size: 15px; fill: #5f6b76; }
  </style>
  <rect width="1440" height="620" rx="30" fill="#f7f8fa"/>
  <rect x="38" y="38" width="1364" height="544" rx="24" fill="#ffffff" stroke="#dfe5ea"/>
  <text x="78" y="98" class="sans" font-size="36" font-weight="850" fill="#17202a">Current KAGE workflow</text>
  <text x="78" y="134" class="sans" font-size="18" fill="#5f6b76">Search local agent memory, inspect it as a conversation, dispatch follow-up work, then bridge or replay the result.</text>

  <g transform="translate(78 188)">
    <rect width="276" height="322" rx="16" fill="#f8fafc" stroke="#dfe5ea"/>
    <rect x="22" y="24" width="232" height="46" rx="8" fill="#ffffff" stroke="#dfe5ea"/>
    <circle cx="46" cy="47" r="8" stroke="#89939d" stroke-width="2"/>
    <path d="M52 53l10 10" stroke="#89939d" stroke-width="2" stroke-linecap="round"/>
    <text x="78" y="53" class="sans body">search "send lag"</text>
    <text x="22" y="112" class="sans kicker" fill="#3b82f6">1. Find</text>
    <text x="22" y="148" class="sans title">Search local memory</text>
    <text x="22" y="184" class="sans body">Bounded windows keep large</text>
    <text x="22" y="208" class="sans body">session histories responsive.</text>
    <rect x="22" y="246" width="232" height="44" rx="8" fill="#eef6ff" stroke="#cfe3ff"/>
    <text x="38" y="273" class="mono" font-size="13" fill="#3b82f6">turns / tools / thinking filters</text>
  </g>

  <path d="M376 350h54" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round"/>
  <path d="M418 338l14 12-14 12" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(456 188)">
    <rect width="276" height="322" rx="16" fill="#f8fafc" stroke="#dfe5ea"/>
    <rect x="22" y="28" width="198" height="58" rx="14" fill="#eef6ff" stroke="#cfe3ff"/>
    <text x="42" y="56" class="sans" font-size="12" font-weight="900" fill="#3b82f6">You</text>
    <text x="42" y="76" class="sans" font-size="14" fill="#17202a">为什么发送会卡？</text>
    <rect x="22" y="108" width="232" height="112" rx="14" fill="#ffffff" stroke="#dfe5ea"/>
    <text x="42" y="140" class="sans" font-size="12" font-weight="900" fill="#3b82f6">Codex</text>
    <text x="42" y="166" class="sans" font-size="14" fill="#17202a">我会先立刻插入用户气泡，</text>
    <text x="42" y="188" class="sans" font-size="14" fill="#17202a">后台等待 agent 结果。</text>
    <text x="22" y="258" class="sans kicker" fill="#3b82f6">2. Inspect</text>
    <text x="22" y="292" class="sans title">Conversation view</text>
  </g>

  <path d="M754 350h54" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round"/>
  <path d="M796 338l14 12-14 12" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(834 188)">
    <rect width="276" height="322" rx="16" fill="#f8fafc" stroke="#dfe5ea"/>
    <text x="22" y="50" class="sans kicker" fill="#3b82f6">3. Dispatch</text>
    <text x="22" y="86" class="sans title">Track tasks on board</text>
    <g transform="translate(22 118)">
      <rect width="232" height="50" rx="10" fill="#eef6ff" stroke="#cfe3ff"/>
      <text x="16" y="24" class="sans" font-size="12" font-weight="900" fill="#3b82f6">RUNNING</text>
      <text x="16" y="40" class="sans" font-size="13" fill="#17202a">Codex screenshot refresh</text>
    </g>
    <g transform="translate(22 180)">
      <rect width="232" height="50" rx="10" fill="#fff5ef" stroke="#f0c9b8"/>
      <text x="16" y="24" class="sans" font-size="12" font-weight="900" fill="#cf7654">NEEDS REVIEW</text>
      <text x="16" y="40" class="sans" font-size="13" fill="#17202a">Claude markdown pass</text>
    </g>
    <g transform="translate(22 242)">
      <rect width="232" height="50" rx="10" fill="#effaf6" stroke="#b7e6d5"/>
      <text x="16" y="24" class="sans" font-size="12" font-weight="900" fill="#15a074">COMPLETED</text>
      <text x="16" y="40" class="sans" font-size="13" fill="#17202a">QoderCLI package check</text>
    </g>
  </g>

  <path d="M1132 350h54" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round"/>
  <path d="M1174 338l14 12-14 12" stroke="#c7d0d9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1210 188)">
    <rect width="276" height="322" rx="16" fill="#f8fafc" stroke="#dfe5ea"/>
    <text x="22" y="50" class="sans kicker" fill="#15a074">4. Reuse</text>
    <text x="22" y="86" class="sans title">Bridge or replay</text>
    <rect x="22" y="118" width="232" height="46" rx="8" fill="#ffffff" stroke="#dfe5ea"/>
    <text x="42" y="147" class="sans" font-size="14" font-weight="800" fill="#17202a">Bridge Claude -&gt; Codex</text>
    <rect x="22" y="180" width="232" height="46" rx="8" fill="#ffffff" stroke="#dfe5ea"/>
    <text x="42" y="209" class="sans" font-size="14" font-weight="800" fill="#17202a">Replay local story</text>
    <rect x="22" y="242" width="232" height="46" rx="8" fill="#17202a"/>
    <text x="42" y="271" class="mono" font-size="13" fill="#34d77b">$ codex resume 019e...</text>
  </g>
</svg>
